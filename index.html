<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="vRooster">
<meta id="theme-color-meta" name="theme-color" content="#f0eef9">
<title>vRooster</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-grad:linear-gradient(160deg,#f0eef9 0%,#ddd8f0 50%,#cfc8e8 100%);
  --glass:rgba(255,255,255,0.96);
  --glass2:rgba(255,255,255,0.88);
  --glass-border:rgba(200,195,230,0.6);
  --glass-shadow:0 2px 8px rgba(0,98,255,0.1),inset 1px 1px 0 rgba(255,255,255,1),inset -1px -1px 2px rgba(255,255,255,0.5);
  --glass-shadow-lg:0 8px 32px rgba(0,98,255,0.15),inset 1px 1px 0 rgba(255,255,255,1),inset -1px -1px 2px rgba(255,255,255,0.5);
  --text:#0b0f2a;--text2:#3d3a55;--text3:#7c7899;
  --accent:#0062ff;--accent2:#0075ff;--accent-light:rgba(0,98,255,0.12);
  --red:#e83a4a;--orange:#f07b20;
  --r:30px;--r2:36px;--r3:34px;--r4:30px;
  --font:'DM Sans',sans-serif;
  --ease:cubic-bezier(0,0,.47,1.15);
  --ease2:cubic-bezier(0.34,1.56,0.64,1);
  --nav-h:calc(72px + env(safe-area-inset-top, 0px));
  --nav-inner:72px;
  --nav-h-mob:calc(60px + env(safe-area-inset-top, 0px));
  --nav-inner-mob:60px;
}

html{min-height:100vh;font-family:var(--font);color:var(--text);font-size:16px;overflow-x:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
body{min-height:100dvh;background:var(--bg-grad);background-attachment:fixed;display:flex;flex-direction:column;-webkit-touch-callout:none;}

/* DARK MODE */
body.dark-mode nav,.dark-mode .mobile-day-header{background:rgba(12,11,20,0.97)!important;border-color:rgba(64,73,112,0.6)!important;}
body.dark-mode .settings-dropdown{background:rgb(20,19,30)!important;border-color:rgba(64,73,112,0.6)!important;}
body.dark-mode .activity-card,.dark-mode .day-header,.dark-mode .list-row,.dark-mode .mobile-row,.dark-mode .empty-col{background:rgb(26,25,38)!important;border-color:rgba(64,73,112,0.5)!important;}
body.dark-mode .modal-panel{background:rgb(16,15,26)!important;border-color:rgba(64,73,112,0.6)!important;}
body.dark-mode .btn-icon{background:rgba(38,38,58,0.98)!important;border-color:rgba(64,73,112,0.6)!important;box-shadow:inset 1px 1px 0 rgba(88,93,120,0.5),0 2px 8px rgba(0,0,0,0.4)!important;}
body.dark-mode .day-nav-tab{background:rgba(38,38,58,0.98)!important;border-color:rgba(64,73,112,0.5)!important;}
body.dark-mode .day-nav-tab.active{background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 100%)!important;}
body.dark-mode .day-nav-btn{background:rgba(38,38,58,0.98)!important;border-color:rgba(64,73,112,0.5)!important;}
body.dark-mode .shortcut-btn{background:rgba(38,38,58,0.98)!important;border-color:rgba(64,73,112,0.5)!important;}
body.dark-mode .stof-divider{background:rgba(255,255,255,0.08)!important;}
body.dark-mode .rooster-select-btn{background:rgba(38,38,58,0.98)!important;border-color:rgba(64,73,112,0.5)!important;color:#fff!important;}
body.dark-mode .rooster-dropdown-list{background:rgb(20,19,30)!important;border-color:rgba(64,73,112,0.6)!important;}
body.dark-mode #toast{background:rgb(26,25,38)!important;border-color:rgba(64,73,112,0.6)!important;}
body.dark-mode .view-toggle{background:rgba(38,38,58,0.7)!important;border-color:rgba(64,73,112,0.5)!important;}
body.dark-mode .view-btn.active{background:rgba(48,48,72,0.98)!important;}
body.dark-mode .modal-ghost{background:rgb(26,25,38)!important;}
body.dark-mode .modal-close-btn{background:rgba(38,38,58,0.98)!important;border-color:rgba(64,73,112,0.5)!important;}

/* NAV */
nav{
  position:sticky;top:0;z-index:300;
  background:rgba(240,238,249,0.97);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(200,195,230,0.5);
  padding-top:env(safe-area-inset-top,0px);
  padding-left:28px;padding-right:28px;
  height:var(--nav-h);display:flex;align-items:flex-end;
  transition:background .3s;
}
.nav-inner{width:100%;display:flex;align-items:center;gap:12px;height:var(--nav-inner);}
@media(max-width:750px){nav{padding-left:16px;padding-right:16px;height:var(--nav-h-mob);}.nav-inner{height:var(--nav-inner-mob);}}

.nav-logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.nav-logo-mark{width:36px;height:36px;border-radius:11px;background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;letter-spacing:-0.5px;box-shadow:0 2px 12px var(--accent-light),inset 1px 1px 0 rgba(255,255,255,0.25);flex-shrink:0;}
.nav-logo-title{font-size:18px;font-weight:800;letter-spacing:-0.5px;color:var(--text);line-height:1;}
.nav-logo-title span{color:var(--accent);}
.nav-logo-sub{font-size:11px;color:var(--text3);font-weight:600;margin-top:1px;}
.nav-spacer{flex:1;}

.view-toggle{display:flex;background:rgba(255,255,255,0.7);border:1px solid var(--glass-border);border-radius:var(--r4);padding:3px;gap:2px;box-shadow:var(--glass-shadow);}
@media(max-width:750px){.view-toggle{display:none!important;}}
.view-btn{padding:5px 12px;border-radius:26px;font-size:12px;font-weight:700;color:var(--text3);transition:all .2s;display:flex;align-items:center;gap:5px;cursor:pointer;background:none;border:none;font-family:var(--font);}
.view-btn.active{background:var(--glass);color:var(--accent);box-shadow:var(--glass-shadow);}
.view-btn svg{width:13px;height:13px;}

.btn-icon{width:40px;height:40px;padding:0;display:inline-flex;align-items:center;justify-content:center;background:var(--glass);box-shadow:var(--glass-shadow);border:1px solid var(--glass-border);border-radius:var(--r3);cursor:pointer;transition:all .2s var(--ease);flex-shrink:0;}
.btn-icon:hover{background:#fff;transform:scale(1.08);box-shadow:var(--glass-shadow-lg);}
.btn-icon:active{transform:scale(0.96);}
.btn-icon svg{width:18px;height:18px;}

/* SETTINGS DROPDOWN */
.settings-dropdown-wrap{position:relative;margin-left:10px;}
.settings-dropdown{position:absolute;right:-8px;top:50px;background:rgba(255,255,255,0.99);border:1px solid rgba(200,195,230,0.6);border-radius:var(--r);padding:16px;min-width:295px;box-shadow:0 8px 40px rgba(80,60,160,0.22);z-index:500;transform-origin:top right;display:none;}
.settings-dropdown.open{display:block;animation:dropIn .25s var(--ease2) both;}
.settings-dropdown.closing{display:block!important;animation:dropOut .2s cubic-bezier(0.4,0,1,1) both;}
@keyframes dropIn{from{opacity:0;transform:scale(0.88) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes dropOut{from{opacity:1;transform:scale(1) translateY(0)}to{opacity:0;transform:scale(0.88) translateY(-8px)}}

.ss-title{font-size:11px;font-weight:800;text-transform:uppercase;color:var(--text2);letter-spacing:.5px;margin-bottom:8px;}
.ss-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;gap:12px;}
.ss-label{font-size:14px;color:var(--text);font-weight:600;}
.ss-row.disabled .ss-label{color:var(--text3);}
.ss-divider{height:1px;background:rgba(200,195,230,0.4);margin:10px 0;}
.toggle{position:relative;width:46px;height:26px;cursor:pointer;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-slider{position:absolute;inset:0;background:rgba(180,170,210,0.5);border-radius:13px;transition:.25s;}
.toggle-slider::after{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.25s var(--ease2);box-shadow:0 2px 6px rgba(80,60,160,0.2);}
.toggle input:checked+.toggle-slider{background:var(--accent);}
.toggle input:checked+.toggle-slider::after{transform:translateX(20px);}
.toggle.disabled{opacity:0.4;pointer-events:none;}
.accent-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:4px 0;}
.accent-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;transition:all .2s var(--ease2);border:2px solid transparent;}
.accent-swatch:hover{transform:scale(1.15);}
.accent-swatch.active{border-color:rgba(0,0,0,0.5);box-shadow:0 0 8px rgba(0,0,0,0.3);}
.rooster-select-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(245,243,255,0.95);border:1px solid var(--glass-border);border-radius:var(--r4);font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;font-family:var(--font);box-shadow:var(--glass-shadow);}
.rooster-select-btn:hover{background:#fff;}
.rooster-select-btn svg{width:14px;height:14px;color:var(--text3);flex-shrink:0;}
.rooster-dropdown-list{margin-top:6px;background:rgba(255,255,255,0.99);border:1px solid rgba(200,195,230,0.6);border-radius:var(--r4);overflow:hidden;display:none;box-shadow:0 4px 24px rgba(80,60,160,0.18);}
.rooster-dropdown-list.open{display:block;animation:dropIn .2s var(--ease2) both;}
.rooster-dropdown-item{padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:space-between;gap:8px;transition:background .15s;border-bottom:1px solid rgba(200,195,230,0.25);}
.rooster-dropdown-item:last-child{border-bottom:none;}
.rooster-dropdown-item:hover{background:var(--accent-light);}
.rooster-dropdown-item.active{color:var(--accent);}
.rooster-dropdown-item small{font-size:11px;color:var(--text3);flex-shrink:0;font-weight:500;}

/* EXPIRED BANNER */
.expired-banner{background:linear-gradient(90deg,rgba(240,123,32,0.15),rgba(240,123,32,0.08));border-bottom:1px solid rgba(240,123,32,0.3);color:var(--orange);text-align:center;padding:10px 16px;font-size:13px;font-weight:700;display:none;}
.expired-banner.show{display:block;}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:28px 28px 60px;width:100%;}
@media(max-width:750px){.main{display:none;}}

/* GRID VIEW */
.grid-view{display:none;}
.grid-view.active{display:block;}
.grid-container{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;}
.grid-day-col{flex:0 0 auto;width:clamp(155px,calc((100% - 14px*5)/6),220px);display:flex;flex-direction:column;gap:10px;}

.day-header{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r2);padding:14px 12px;text-align:center;box-shadow:var(--glass-shadow);}
.day-hdr-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);}
.day-hdr-num{font-size:28px;font-weight:800;color:var(--text);line-height:1.1;}
.day-hdr-num.today{color:var(--accent);}
.day-hdr-month{font-size:11px;color:var(--text3);font-weight:600;margin-top:1px;}

.activity-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r2);padding:18px 16px;cursor:pointer;box-shadow:var(--glass-shadow);transition:transform .25s var(--ease),box-shadow .25s var(--ease);position:relative;overflow:hidden;display:flex;flex-direction:column;gap:6px;will-change:transform;}
.activity-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0.65;}
.activity-card:hover{transform:translateY(-4px) scale(1.04);box-shadow:var(--glass-shadow-lg);}
.activity-card:active{transform:scale(0.97);}
.ac-icon{font-size:24px;line-height:1;}
.ac-vak{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-0.2px;margin-top:2px;}
.ac-tijd{font-size:11px;color:var(--text3);font-weight:600;}
.empty-col{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r2);padding:20px;text-align:center;color:var(--text3);font-size:13px;font-weight:600;box-shadow:var(--glass-shadow);}

/* LIST VIEW */
.list-view{display:none;}
.list-view.active{display:block;}
.day-nav{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.day-nav-btn{width:40px;height:40px;border-radius:50%;background:var(--glass);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;transition:all .2s var(--ease);box-shadow:var(--glass-shadow);flex-shrink:0;}
.day-nav-btn:hover:not(:disabled){background:#fff;transform:scale(1.1);box-shadow:var(--glass-shadow-lg);}
.day-nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
.day-nav-btn svg{width:14px;height:14px;}
.day-nav-tabs{display:flex;gap:6px;flex:1;overflow:hidden;}
.day-nav-tab{flex:1;min-width:0;text-align:center;padding:10px 6px;border-radius:var(--r4);cursor:pointer;transition:all .2s var(--ease);background:var(--glass);border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);}
.day-nav-tab:hover{transform:translateY(-2px);box-shadow:var(--glass-shadow-lg);}
.dnt-name{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);}
.dnt-date{font-size:18px;font-weight:800;color:var(--text2);}
.day-nav-tab.active{background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 100%);border-color:var(--accent);box-shadow:0 4px 14px var(--accent-light),inset 1px 1px 0 rgba(255,255,255,0.2);}
.day-nav-tab.active .dnt-name,.day-nav-tab.active .dnt-date{color:#fff;}
.day-nav-tab.today .dnt-date{color:var(--accent);}
.day-nav-tab.active.today .dnt-date{color:#fff;}
.list-panels{position:relative;}
.list-panel{display:none;flex-direction:column;gap:10px;}
.list-panel.active{display:flex;}
@keyframes slideInR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInL{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.list-panel.anim-r{animation:slideInR .28s var(--ease) both;}
.list-panel.anim-l{animation:slideInL .28s var(--ease) both;}
.list-row{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);padding:16px 20px;cursor:pointer;box-shadow:var(--glass-shadow);transition:transform .2s var(--ease),box-shadow .2s var(--ease);display:grid;grid-template-columns:54px 1fr auto;gap:14px;align-items:center;position:relative;overflow:hidden;}
.list-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0.65;}
.list-row:hover{transform:translateX(4px);box-shadow:var(--glass-shadow-lg);}
.list-row:active{transform:scale(0.99);}
.lr-icon{font-size:30px;text-align:center;}
.lr-vak{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px;}
.lr-meta{font-size:13px;color:var(--text2);margin-top:3px;font-weight:500;}
.lr-arrow{color:var(--text3);}
.lr-arrow svg{width:16px;height:16px;}

/* LIST ENTRANCE ANIMATIONS */
@keyframes listRowIn{from{opacity:0;transform:translateY(14px) scale(0.97)}to{opacity:1;transform:none}}
.list-row.list-anim{animation:listRowIn .36s var(--ease2) both;}
@keyframes navBarIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.day-nav.list-nav-anim{animation:navBarIn .32s var(--ease2) both;}

/* MOBILE VIEW — NO CSS opacity:0 trap */
.mobile-view{display:none;flex-direction:column;}
@media(max-width:750px){
  .mobile-view{display:flex;min-height:calc(100dvh - var(--nav-h-mob));}
  .main{display:none;}
}

.mobile-day-header{background:rgba(240,238,249,0.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(200,195,230,0.5);padding:12px 16px;position:sticky;top:var(--nav-h-mob);z-index:100;}
.mobile-day-title{font-size:19px;font-weight:800;letter-spacing:-0.3px;color:var(--text);margin-bottom:10px;}
.mobile-day-tabs{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;justify-content:center;}
.mobile-day-tabs::-webkit-scrollbar{display:none;}
.mobile-day-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:4px 10px;border-radius:var(--r4);cursor:pointer;transition:all .2s var(--ease);min-width:44px;}
.mdt-name{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--text3);letter-spacing:.04em;}
.mdt-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--text2);margin-top:3px;transition:all .25s var(--ease2);}
.mobile-day-tab.active .mdt-name{color:var(--accent);}
.mobile-day-tab.active .mdt-dot{background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;box-shadow:0 4px 10px var(--accent-light);}

.mobile-panels-wrapper{flex:1;overflow:hidden;position:relative;}
.mobile-panels-track{display:flex;height:100%;will-change:transform;transition:transform .32s cubic-bezier(0.4,0,0.2,1);}
.mobile-panel{flex-shrink:0;width:100%;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));}
.mobile-row{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);padding:14px 16px;cursor:pointer;box-shadow:var(--glass-shadow);transition:transform .2s var(--ease),box-shadow .2s var(--ease);display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;}
.mobile-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0.65;}
.mobile-row:hover{transform:translateX(3px);box-shadow:var(--glass-shadow-lg);}
.mobile-row:active{transform:scale(0.98);opacity:0.85;}
.mr-icon{font-size:28px;flex-shrink:0;}
.mr-vak{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-0.2px;}
.mr-tijd{font-size:12px;color:var(--text3);font-weight:600;margin-top:2px;}
.mobile-empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px;font-weight:600;}

/* MOBILE ROW ENTRANCE */
@keyframes mobRowIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
.mobile-row.mob-anim,.mobile-empty.mob-anim{animation:mobRowIn .32s var(--ease2) both;}

/* LOADING */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;color:var(--text2);font-size:15px;font-weight:600;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-spinner{width:40px;height:40px;position:relative;}
.loading-spinner::before{content:'';position:absolute;inset:0;border:3px solid rgba(200,195,230,0.4);border-radius:50%;}
.loading-spinner::after{content:'';position:absolute;inset:0;border:3px solid transparent;border-top-color:var(--accent);border-right-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;pointer-events:none;visibility:hidden;}
.modal-overlay.open{pointer-events:all;visibility:visible;}
.modal-backdrop{position:absolute;inset:0;background:rgba(130,115,185,0.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);opacity:0;transition:opacity .35s var(--ease);}
.modal-overlay.open .modal-backdrop{opacity:1;}
.modal-panel{position:relative;z-index:1;width:min(680px,90vw);max-height:84dvh;background:rgba(255,255,255,0.99);border:1.5px solid var(--glass-border);border-radius:var(--r2);padding:28px 32px 36px;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 24px 64px rgba(80,60,160,0.26);opacity:0;pointer-events:none;}
.modal-close-btn{position:absolute;top:18px;right:20px;width:32px;height:32px;border-radius:50%;background:var(--accent-light);color:var(--accent);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s var(--ease);z-index:2;pointer-events:all;}
.modal-close-btn:hover{background:rgba(232,58,74,0.12);color:var(--red);}
.modal-close-btn svg{width:14px;height:14px;}

/* MOBILE MODAL */
@media(max-width:750px){
  .modal-overlay{align-items:flex-start;}
  .modal-backdrop{backdrop-filter:none;-webkit-backdrop-filter:none;background:var(--bg-grad);background-attachment:fixed;transition:none;}
  .modal-overlay.open .modal-backdrop{opacity:1;}
  .modal-panel{
    width:100%;max-width:100%;height:100dvh;max-height:100dvh;
    border-radius:0;border:none;padding:0;overflow-y:auto;
    /* Fully opaque solid bg — no glass */
    background:var(--bg-grad)!important;background-attachment:fixed!important;
    box-shadow:none;
    opacity:1!important;
    transform:translateX(100%);
    pointer-events:none;
    transition:transform .36s cubic-bezier(0.4,0,0.2,1);
  }
  .modal-overlay.open .modal-panel{transform:translateX(0);pointer-events:all!important;}
  /* Back button top-left, always touchable */
  .modal-close-btn{
    position:fixed;
    top:calc(env(safe-area-inset-top,0px) + 12px);
    left:16px;right:auto;
    width:38px;height:38px;
    background:rgba(255,255,255,0.96)!important;
    border:1px solid var(--glass-border)!important;
    box-shadow:var(--glass-shadow);
    pointer-events:all;
    z-index:1002;
  }
  .modal-scroll{padding:calc(env(safe-area-inset-top,0px) + 66px) 20px calc(env(safe-area-inset-bottom,0px) + 32px);}
  .close-x{display:none!important;}
  .close-back{display:block!important;}
}
@media(min-width:751px){
  .modal-scroll{padding:0;}
  .close-back{display:none!important;}
}

/* DESKTOP GHOST */
.modal-ghost{position:fixed;z-index:1001;background:rgba(255,255,255,0.99);border:1.5px solid var(--glass-border);border-radius:var(--r2);box-shadow:var(--glass-shadow);display:flex;flex-direction:column;gap:6px;padding:18px 16px;overflow:hidden;pointer-events:none;will-change:left,top,width,height;}
.modal-ghost::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0.65;}
.ghost-card-content{display:flex;flex-direction:column;gap:6px;}

/* MODAL CONTENT */
.modal-vak-name{font-size:26px;font-weight:800;letter-spacing:-0.4px;color:var(--text);margin-bottom:5px;padding-right:48px;}
.modal-meta{font-size:13px;color:var(--text2);font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:24px;}
.modal-meta svg{width:13px;height:13px;color:var(--text3);}
.modal-shortcuts{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
.shortcut-btn{flex:1;min-width:80px;max-width:140px;padding:14px 8px;border-radius:var(--r2);border:1px solid var(--glass-border);background:var(--glass);display:flex;flex-direction:column;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .2s var(--ease);text-decoration:none;box-shadow:var(--glass-shadow);}
.shortcut-btn:hover{background:#fff;transform:translateY(-3px) scale(1.04);box-shadow:var(--glass-shadow-lg);color:var(--text);}
.shortcut-btn:active{transform:scale(0.97);}
.shortcut-btn.primary{background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;border-color:var(--accent);box-shadow:0 4px 16px var(--accent-light),inset 1px 1px 0 rgba(255,255,255,0.2);}
.shortcut-btn.primary:hover{filter:brightness(1.1);transform:translateY(-3px) scale(1.02);}
.shortcut-btn svg{width:26px;height:26px;}
.modal-stof{display:flex;flex-direction:column;}
.stof-block{padding:16px 0;}
.stof-divider{height:1px;background:rgba(200,195,230,0.4);}
.stof-label{font-size:14px;font-weight:800;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:7px;}
.stof-label::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent);opacity:0.8;flex-shrink:0;}
.stof-text{font-size:14px;line-height:1.7;color:var(--text2);padding-left:15px;}
.stof-text i{font-style:italic;color:var(--text);}
.stof-empty{color:var(--text3);font-style:italic;}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:rgba(255,254,255,0.99);border:1px solid rgba(200,195,230,0.7);border-radius:var(--r);padding:12px 20px;font-size:14px;font-weight:700;box-shadow:0 8px 32px rgba(80,60,160,0.2);opacity:0;transform:translateY(12px);pointer-events:none;transition:all .25s var(--ease2);}
#toast.show{opacity:1;transform:translateY(0);}
@media(max-width:750px){#toast{bottom:calc(env(safe-area-inset-bottom,0px) + 16px);left:16px;right:16px;text-align:center;}}

/* GRID ENTRANCE */
.grid-day-col{opacity:0;transform:scale(0.78) translateY(12px);filter:blur(6px);}
.grid-day-col.entered{opacity:1;transform:scale(1) translateY(0);filter:blur(0);transition:opacity .42s var(--ease2),transform .42s var(--ease2),filter .35s var(--ease);}
.grid-container .grid-day-col .activity-card,
.grid-container .grid-day-col .day-header,
.grid-container .grid-day-col .empty-col{opacity:0;transform:scale(0.86) translateY(8px);}
.grid-container .grid-day-col.entered .day-header{opacity:1;transform:none;transition:opacity .32s var(--ease2),transform .32s var(--ease2);transition-delay:0ms;}
.grid-container .grid-day-col.entered .activity-card,
.grid-container .grid-day-col.entered .empty-col{opacity:1;transform:none;transition:opacity .32s var(--ease2),transform .32s var(--ease2);}
</style>
</head>
<body>

<nav>
  <div class="nav-inner" id="navInner">
    <div class="nav-logo">
      <div class="nav-logo-mark">v</div>
      <div>
        <div class="nav-logo-title">vRooster<span>.</span></div>
        <div class="nav-logo-sub" id="roosterSubtitle">Laden…</div>
      </div>
    </div>
    <div class="nav-spacer"></div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnGrid" onclick="setView('grid')">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>Grid
      </button>
      <button class="view-btn" id="btnList" onclick="setView('list')">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="4" y="2" width="10" height="2" rx="1"/><rect x="1" y="2" width="2" height="2" rx="0.5"/><rect x="4" y="7" width="10" height="2" rx="1"/><rect x="1" y="7" width="2" height="2" rx="0.5"/><rect x="4" y="12" width="10" height="2" rx="1"/><rect x="1" y="12" width="2" height="2" rx="0.5"/></svg>Lijst
      </button>
    </div>
    <div class="settings-dropdown-wrap">
      <button class="btn-icon" onclick="toggleSettings()" title="Instellingen">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
      </button>
      <div class="settings-dropdown" id="settingsDropdown">
        <div style="margin-bottom:14px;">
          <div class="ss-title">Rooster</div>
          <button class="rooster-select-btn" onclick="toggleRoosterDropdown()">
            <span id="roosterSelectLabel">Laden…</span>
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6l4 4 4-4"/></svg>
          </button>
          <div class="rooster-dropdown-list" id="roosterDropdownList"></div>
        </div>
        <div class="ss-divider"></div>
        <div style="margin:14px 0;">
          <div class="ss-title">Synchronisatie</div>
          <div class="ss-row">
            <span class="ss-label">Synchroniseer met Velios+</span>
            <label class="toggle"><input type="checkbox" id="toggleSync" checked onchange="handleSyncChange()"><span class="toggle-slider"></span></label>
          </div>
        </div>
        <div class="ss-divider"></div>
        <div style="margin-top:14px;">
          <div class="ss-title">Verschijning</div>
          <div class="ss-row" id="rowDark">
            <span class="ss-label">Donkere modus</span>
            <label class="toggle" id="darkToggle"><input type="checkbox" id="toggleDark" onchange="handleDarkChange()"><span class="toggle-slider"></span></label>
          </div>
          <div class="ss-title" style="margin-top:10px;">Accentkleur</div>
          <div class="accent-grid" id="accentGrid"></div>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="expired-banner" id="expiredBanner">⚠️ Dit rooster is verlopen. Je bekijkt een verlopen versie.</div>

<div class="main" id="mainContent">
  <div class="loading-state" id="loadingState"><div class="loading-spinner"></div><div>Rooster laden…</div></div>
  <div class="grid-view active" id="gridView"><div class="grid-container" id="gridContainer"></div></div>
  <div class="list-view" id="listView">
    <div class="day-nav" id="dayNav">
      <button class="day-nav-btn" id="dayNavPrev" onclick="navigateDay(-1)" disabled>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M10 4l-4 4 4 4"/></svg>
      </button>
      <div class="day-nav-tabs" id="dayNavTabs"></div>
      <button class="day-nav-btn" id="dayNavNext" onclick="navigateDay(1)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 4l4 4-4 4"/></svg>
      </button>
    </div>
    <div class="list-panels" id="listPanels"></div>
  </div>
</div>

<div class="mobile-view" id="mobileView">
  <div class="mobile-day-header">
    <div class="mobile-day-title" id="mobileDayTitle">—</div>
    <div class="mobile-day-tabs" id="mobileDayTabs"></div>
  </div>
  <div class="mobile-panels-wrapper" id="mobilePanelsWrapper">
    <div class="mobile-panels-track" id="mobilePanelsTrack"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()"></div>
  <div class="modal-panel" id="modalPanel">
    <button class="modal-close-btn" id="modalCloseBtn" onclick="closeModal()">
      <svg class="close-x" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
      <svg class="close-back" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M10 4l-4 4 4 4"/></svg>
    </button>
    <div class="modal-scroll" id="modalScroll">
      <div class="modal-vak-name" id="modalVakName">—</div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-shortcuts" id="modalShortcuts"></div>
      <div class="modal-stof" id="modalStof"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const ACCENTS=[{hex:'#0062ff',label:'Blauw'},{hex:'#ff6b6b',label:'Rood'},{hex:'#10b981',label:'Groen'},{hex:'#f59e0b',label:'Amber'},{hex:'#8b5cf6',label:'Paars'}];
const NL_DAYS=['zo','ma','di','wo','do','vr','za'];
const NL_DAYS_F=['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
const NL_MON=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const NL_MON_F=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const ROOSTER_DIR='./rooster/';
const SKEY='vrooster_settings';
const VKEY='vrooster_view';

let allRoosters=[],currentRooster=null,days=[],currentDayIdx=0,currentView='grid';
let ddOpen=false;
let settings={syncVelios:true,dark:false,accent:'#0062ff'};
let modalOpen=false,ghostEl=null,closeTimer=null;
let animTimers=[];

const isMob=()=>window.innerWidth<=750;

/* ── SETTINGS ── */
function loadSettings(){
  const s=safeJson(localStorage.getItem(SKEY));
  if(s)settings={...settings,...s};
  if(settings.syncVelios){
    const v=safeJson(localStorage.getItem('sd_theme'));
    if(v){if(v.darkMode!=null)settings.dark=v.darkMode;if(v.accentColor!=null)settings.accent=v.accentColor;}
  }
  applyTheme();renderSwatches();
  document.getElementById('toggleSync').checked=settings.syncVelios;
  document.getElementById('toggleDark').checked=settings.dark;
  updateDisabled();
  /* Restore view preference */
  const sv=localStorage.getItem(VKEY)||'grid';
  currentView=sv;
  _applyViewBtns(sv);
}
function saveSettings(){localStorage.setItem(SKEY,JSON.stringify(settings));}
function safeJson(s){try{return s?JSON.parse(s):null;}catch{return null;}}

function applyTheme(){
  const{dark,accent}=settings;
  document.body.classList.toggle('dark-mode',dark);
  document.getElementById('theme-color-meta').content=dark?'#0a0812':'#f0eef9';
  const R=document.documentElement.style;
  if(dark){
    R.setProperty('--bg-grad','linear-gradient(180deg,rgb(8,8,16) 0%,rgb(10,8,18) 100%)');
    R.setProperty('--glass','rgb(26,25,38)');R.setProperty('--glass2','rgba(26,25,38,0.97)');
    R.setProperty('--text','#fff');R.setProperty('--text2','#e8e8f0');R.setProperty('--text3','rgba(255,255,255,0.48)');
    R.setProperty('--glass-border','rgba(64,73,112,0.6)');
    R.setProperty('--glass-shadow','0 2px 10px rgba(0,5,48,0.8),inset 1px 1px 0 rgba(88,93,120,0.9)');
    R.setProperty('--glass-shadow-lg','0 8px 32px rgba(0,5,48,0.8),inset 1px 1px 0 rgba(88,93,120,0.9)');
  } else {
    R.setProperty('--bg-grad','linear-gradient(160deg,#f0eef9 0%,#ddd8f0 50%,#cfc8e8 100%)');
    R.setProperty('--glass','rgba(255,255,255,0.96)');R.setProperty('--glass2','rgba(255,255,255,0.88)');
    R.setProperty('--text','#0b0f2a');R.setProperty('--text2','#3d3a55');R.setProperty('--text3','#7c7899');
    R.setProperty('--glass-border','rgba(200,195,230,0.6)');
    R.setProperty('--glass-shadow','0 2px 8px rgba(0,98,255,0.1),inset 1px 1px 0 rgba(255,255,255,1),inset -1px -1px 2px rgba(255,255,255,0.5)');
    R.setProperty('--glass-shadow-lg','0 8px 32px rgba(0,98,255,0.15),inset 1px 1px 0 rgba(255,255,255,1),inset -1px -1px 2px rgba(255,255,255,0.5)');
  }
  const h=accent.replace('#','');
  const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
  R.setProperty('--accent',accent);
  R.setProperty('--accent2',`rgb(${Math.max(0,r-20)},${Math.max(0,g-20)},${Math.max(0,b-20)})`);
  R.setProperty('--accent-light',`rgba(${r},${g},${b},0.12)`);
}
function handleSyncChange(){
  settings.syncVelios=document.getElementById('toggleSync').checked;
  if(settings.syncVelios){
    const v=safeJson(localStorage.getItem('sd_theme'));
    if(v){if(v.darkMode!=null)settings.dark=v.darkMode;if(v.accentColor!=null)settings.accent=v.accentColor;}
    document.getElementById('toggleDark').checked=settings.dark;
  }
  saveSettings();applyTheme();renderSwatches();updateDisabled();
}
function handleDarkChange(){if(settings.syncVelios)return;settings.dark=document.getElementById('toggleDark').checked;saveSettings();applyTheme();}
function setAccent(c){if(settings.syncVelios)return;settings.accent=c;saveSettings();applyTheme();renderSwatches();}
function updateDisabled(){
  const s=settings.syncVelios;
  document.getElementById('rowDark').classList.toggle('disabled',s);
  document.getElementById('darkToggle').classList.toggle('disabled',s);
  const ag=document.getElementById('accentGrid');ag.style.opacity=s?'0.4':'';ag.style.pointerEvents=s?'none':'';
}
function renderSwatches(){
  document.getElementById('accentGrid').innerHTML=ACCENTS.map(c=>`<div class="accent-swatch${c.hex===settings.accent?' active':''}" style="background:${c.hex}" title="${c.label}" onclick="setAccent('${c.hex}')"></div>`).join('');
}

/* ── SETTINGS DROPDOWN ── */
function toggleSettings(){
  const dd=document.getElementById('settingsDropdown');
  if(ddOpen){dd.classList.add('closing');setTimeout(()=>{dd.classList.remove('open','closing');ddOpen=false;},200);}
  else{dd.classList.remove('closing');dd.classList.add('open');ddOpen=true;setTimeout(()=>document.addEventListener('click',onOutside,{once:true}),10);}
}
function onOutside(e){
  const wrap=document.querySelector('.settings-dropdown-wrap');
  if(!wrap.contains(e.target)){const dd=document.getElementById('settingsDropdown');dd.classList.add('closing');setTimeout(()=>{dd.classList.remove('open','closing');ddOpen=false;},200);}
  else if(ddOpen)setTimeout(()=>document.addEventListener('click',onOutside,{once:true}),10);
}
function toggleRoosterDropdown(){document.getElementById('roosterDropdownList').classList.toggle('open');}

/* ── VIEW ── */
function _applyViewBtns(v){
  document.getElementById('gridView').classList.toggle('active',v==='grid');
  document.getElementById('listView').classList.toggle('active',v==='list');
  document.getElementById('btnGrid').classList.toggle('active',v==='grid');
  document.getElementById('btnList').classList.toggle('active',v==='list');
}
function setView(v){
  if(v===currentView)return;
  currentView=v;
  localStorage.setItem(VKEY,v);
  _applyViewBtns(v);
  triggerEntranceAnim();
}

/* ── ROOSTER LOADING ── */
async function discoverRoosters(){
  let found=[];
  try{
    const r=await fetch(ROOSTER_DIR+'index.json');
    if(r.ok){
      const list=await r.json();
      for(const f of list){try{const res=await fetch(ROOSTER_DIR+f);if(res.ok){const d=await res.json();found.push({file:f,data:d});}}catch(e){}}
      return found;
    }
  }catch(e){}
  for(const f of['CTP2k32026.vrooster','CTP3k32026.vrooster','periode3.vrooster','periode2.vrooster','periode1.vrooster']){
    try{const res=await fetch(ROOSTER_DIR+f);if(res.ok){const d=await res.json();found.push({file:f,data:d});}}catch(e){}
  }
  return found;
}

async function initApp(){
  loadSettings();
  const roosters=await discoverRoosters();
  allRoosters=roosters;
  document.getElementById('loadingState').style.display='none';
  if(!roosters.length){
    document.getElementById('gridContainer').innerHTML='<div style="color:var(--text3);padding:40px;text-align:center;font-size:14px;font-weight:600;width:100%;">Geen .vrooster bestanden gevonden in ./rooster/</div>';
    triggerEntranceAnim();return;
  }
  roosters.sort((a,b)=>new Date(b.data.startdatum)-new Date(a.data.startdatum));
  buildRoosterSelector();
  loadRooster(roosters[0]);
}

function buildRoosterSelector(){
  document.getElementById('roosterDropdownList').innerHTML=allRoosters.map((r,i)=>
    `<div class="rooster-dropdown-item${i===0?' active':''}" id="rItem${i}" onclick="selectRooster(${i})">
      <span>${esc(r.data.naam)}<span style="font-size:11px;color:var(--text3);margin-left:6px;font-weight:500;">${esc(r.data.klas)}</span></span>
      <small>${fDate(r.data.startdatum)} – ${fDate(r.data.einddatum)}</small>
    </div>`
  ).join('');
}

function selectRooster(idx){
  document.querySelectorAll('.rooster-dropdown-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('roosterDropdownList').classList.remove('open');
  loadRooster(allRoosters[idx]);
}

function loadRooster(entry){
  currentRooster=entry.data;
  document.getElementById('roosterSelectLabel').textContent=currentRooster.naam;
  document.getElementById('roosterSubtitle').textContent=`${currentRooster.naam} · ${currentRooster.klas}`;
  document.getElementById('expiredBanner').classList.toggle('show',new Date()>new Date(currentRooster.einddatum+'T23:59:59'));
  buildDays();
  renderAll();       /* re-render wipes old content */
  triggerEntranceAnim();
}

/* ── BUILD DAYS ── */
function buildDays(){
  const map={};
  for(const a of currentRooster.activiteiten){if(!map[a.datum])map[a.datum]=[];map[a.datum].push(a);}
  for(const d in map)map[d].sort((a,b)=>a.tijd.localeCompare(b.tijd));
  days=Object.keys(map).sort().map(d=>({date:d,activities:map[d]}));
  const today=todayStr();
  currentDayIdx=Math.max(0,days.findIndex(d=>d.date===today));
}

/* ── RENDER ── */
function renderAll(){renderGrid();renderList();renderMobile();}

function renderGrid(){
  document.getElementById('gridContainer').innerHTML=days.map(day=>{
    const d=new Date(day.date+'T12:00:00'),isToday=day.date===todayStr();
    return `<div class="grid-day-col">
      <div class="day-header">
        <div class="day-hdr-name">${NL_DAYS[d.getDay()]}</div>
        <div class="day-hdr-num${isToday?' today':''}">${d.getDate()}</div>
        <div class="day-hdr-month">${NL_MON[d.getMonth()]}</div>
      </div>
      ${day.activities.map(a=>`<div class="activity-card" id="card-${a.id}" onclick="openModal('${a.id}',this)">
        <div class="ac-icon">${a.icoon||'📚'}</div>
        <div class="ac-vak">${esc(a.vak)}</div>
        <div class="ac-tijd">${a.tijd}</div>
      </div>`).join('')||'<div class="empty-col">—</div>'}
    </div>`;
  }).join('');
}

function renderList(){
  document.getElementById('dayNavTabs').innerHTML=days.map((day,i)=>{
    const d=new Date(day.date+'T12:00:00'),isToday=day.date===todayStr();
    return `<div class="day-nav-tab${i===currentDayIdx?' active':''}${isToday?' today':''}" onclick="setDay(${i})" id="dTab${i}">
      <div class="dnt-name">${NL_DAYS[d.getDay()]}</div>
      <div class="dnt-date">${d.getDate()}</div>
    </div>`;
  }).join('');
  document.getElementById('listPanels').innerHTML=days.map((day,i)=>
    `<div class="list-panel${i===currentDayIdx?' active':''}" id="lPanel${i}">
      ${day.activities.map(a=>`<div class="list-row" onclick="openModal('${a.id}',null)">
        <div class="lr-icon">${a.icoon||'📚'}</div>
        <div><div class="lr-vak">${esc(a.vak)}</div><div class="lr-meta">${fDateLong(day.date)} · ${a.tijd}</div></div>
        <div class="lr-arrow"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 4l4 4-4 4"/></svg></div>
      </div>`).join('')}
    </div>`
  ).join('');
  updateNavBtns();
}

function renderMobile(){
  document.getElementById('mobileDayTabs').innerHTML=days.map((day,i)=>{
    const d=new Date(day.date+'T12:00:00');
    return `<div class="mobile-day-tab${i===currentDayIdx?' active':''}" onclick="setDay(${i})" id="mTab${i}">
      <div class="mdt-name">${NL_DAYS[d.getDay()]}</div>
      <div class="mdt-dot">${d.getDate()}</div>
    </div>`;
  }).join('');
  const track=document.getElementById('mobilePanelsTrack');
  track.innerHTML=days.map((day,i)=>
    `<div class="mobile-panel" id="mPanel${i}">
      ${day.activities.length
        ?day.activities.map(a=>`<div class="mobile-row" onclick="openModal('${a.id}',null)">
          <div class="mr-icon">${a.icoon||'📚'}</div>
          <div><div class="mr-vak">${esc(a.vak)}</div><div class="mr-tijd">${a.tijd}</div></div>
        </div>`).join('')
        :'<div class="mobile-empty">Geen activiteiten deze dag.</div>'}
    </div>`
  ).join('');
  track.style.width=(days.length*100)+'%';
  track.querySelectorAll('.mobile-panel').forEach(p=>p.style.width=(100/days.length)+'%');
  updateMobile(false);
  initSwipe();
}

function updateMobile(animate){
  if(!days.length)return;
  const day=days[currentDayIdx],d=new Date(day.date+'T12:00:00');
  document.getElementById('mobileDayTitle').textContent=`${NL_DAYS_F[d.getDay()]} ${d.getDate()} ${NL_MON_F[d.getMonth()]}`;
  document.querySelectorAll('.mobile-day-tab').forEach((el,i)=>el.classList.toggle('active',i===currentDayIdx));
  const track=document.getElementById('mobilePanelsTrack');
  track.style.transition=animate?'transform .32s cubic-bezier(0.4,0,0.2,1)':'none';
  track.style.transform=`translateX(-${(currentDayIdx/days.length)*100}%)`;
  document.getElementById(`mTab${currentDayIdx}`)?.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function initSwipe(){
  const wrap=document.getElementById('mobilePanelsWrapper');
  const fresh=wrap.cloneNode(true);
  wrap.parentNode.replaceChild(fresh,wrap);
  let sx=0,sy=0;
  fresh.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  fresh.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>44){
      if(dx<0&&currentDayIdx<days.length-1)setDay(currentDayIdx+1);
      else if(dx>0&&currentDayIdx>0)setDay(currentDayIdx-1);
    }
  },{passive:true});
}

/* ── NAVIGATION ── */
function setDay(idx){
  if(idx<0||idx>=days.length)return;
  const prev=currentDayIdx,goLeft=idx<prev;
  const oldP=document.getElementById(`lPanel${prev}`),newP=document.getElementById(`lPanel${idx}`);
  if(oldP)oldP.classList.remove('active','anim-r','anim-l');
  if(newP){newP.classList.remove('anim-r','anim-l','active');void newP.offsetWidth;newP.classList.add(goLeft?'anim-l':'anim-r','active');}
  document.querySelectorAll('.day-nav-tab').forEach((el,i)=>el.classList.toggle('active',i===idx));
  currentDayIdx=idx;updateNavBtns();updateMobile(true);
  /* Animate new list rows when day changes in list view */
  if(currentView==='list'&&!isMob())_animateListRows();
  /* Animate mobile rows on swipe */
  if(isMob())_animateMobileRows();
}
function navigateDay(delta){setDay(currentDayIdx+delta);}
function updateNavBtns(){
  const p=document.getElementById('dayNavPrev'),n=document.getElementById('dayNavNext');
  if(p)p.disabled=currentDayIdx===0;if(n)n.disabled=currentDayIdx===days.length-1;
}

/* ── MODAL CONTENT ── */
function buildModalContent(act){
  document.getElementById('modalVakName').textContent=act.vak;
  document.getElementById('modalMeta').innerHTML=`<svg viewBox="0 0 16 16" fill="currentColor" style="width:13px;height:13px;opacity:.5"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zM7 5h2v5H7zm0 6h2v1.5H7z"/></svg>${fDateLong(act.datum)} · ${act.tijd}`;
  let btns='';
  if(act.snelkoppelingen?.begrippen)btns+=`<a href="${act.snelkoppelingen.begrippen}" target="_blank" rel="noopener" class="shortcut-btn primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>Begrippen leren</a>`;
  btns+=`<a href="https://murmellius.magister.net/magister/#/vandaag" target="_blank" rel="noopener" class="shortcut-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Magister</a>`;
  if(act.snelkoppelingen?.bestanden)btns+=`<a href="${act.snelkoppelingen.bestanden}" target="_blank" rel="noopener" class="shortcut-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>Bestanden</a>`;
  document.getElementById('modalShortcuts').innerHTML=btns;
  const s=act.stof;
  const rnd=txt=>{if(!txt||!txt.trim())return'<span class="stof-empty">–</span>';return txt.replace(/<i>([\s\S]*?)<\/i>/g,'<i>$1</i>').replace(/\n/g,'<br>');};
  document.getElementById('modalStof').innerHTML=`
    <div class="stof-block"><div class="stof-label">Theorie</div><div class="stof-text">${rnd(s.theorie)}</div></div>
    <div class="stof-divider"></div>
    <div class="stof-block"><div class="stof-label">Begrippen</div><div class="stof-text">${rnd(s.begrippen)}</div></div>
    <div class="stof-divider"></div>
    <div class="stof-block"><div class="stof-label">Overig</div><div class="stof-text">${rnd(s.overig)}</div></div>`;
}

/* ── MODAL OPEN/CLOSE ── */
function openModal(actId,cardEl){
  if(closeTimer){clearTimeout(closeTimer);closeTimer=null;_resetModal(true);}
  if(modalOpen)return;
  const act=currentRooster.activiteiten.find(a=>a.id===actId);
  if(!act)return;
  buildModalContent(act);
  modalOpen=true;
  document.body.style.overflow='hidden';
  document.getElementById('modalOverlay').classList.add('open');
  if(!isMob())_desktopOpen(act,cardEl);
}

function _desktopOpen(act,cardEl){
  const panel=document.getElementById('modalPanel');
  const grid=document.getElementById('gridContainer');
  grid.style.cssText='transition:opacity .3s ease,filter .3s ease;opacity:0.22;filter:blur(2.5px);pointer-events:none;';
  const cardRect=cardEl?cardEl.getBoundingClientRect():null;
  if(!cardRect){
    panel.style.cssText='opacity:0;pointer-events:none;transform:scale(0.92) translateY(14px);transition:opacity .32s var(--ease2),transform .35s var(--ease2);';
    void panel.offsetWidth;
    requestAnimationFrame(()=>{panel.style.opacity='1';panel.style.transform='none';panel.style.pointerEvents='all';});
    return;
  }
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  const g=document.createElement('div');g.className='modal-ghost';
  g.innerHTML=`<div class="ghost-card-content">
    <div style="font-size:24px;line-height:1;">${act.icoon||'📚'}</div>
    <div style="font-size:15px;font-weight:800;color:var(--text);letter-spacing:-0.2px;margin-top:2px;">${esc(act.vak)}</div>
    <div style="font-size:11px;color:var(--text3);font-weight:600;">${act.tijd}</div>
  </div>`;
  document.body.appendChild(g);ghostEl=g;
  g.style.cssText+=`;left:${cardRect.left}px;top:${cardRect.top}px;width:${cardRect.width}px;height:${cardRect.height}px;transition:none;`;
  panel.style.cssText='visibility:hidden;opacity:0;pointer-events:none;';
  void panel.offsetWidth;
  const mr=panel.getBoundingClientRect();
  panel.style.visibility='';
  const DUR=460,E='cubic-bezier(0.34,1.2,0.64,1)';
  g.style.transition=`left ${DUR}ms ${E},top ${DUR}ms ${E},width ${DUR}ms ${E},height ${DUR}ms ${E},border-radius ${DUR}ms ${E},box-shadow ${DUR}ms ${E}`;
  void g.offsetWidth;
  requestAnimationFrame(()=>{
    g.style.left=`${mr.left}px`;g.style.top=`${mr.top}px`;
    g.style.width=`${mr.width}px`;g.style.height=`${mr.height}px`;
    g.style.borderRadius='var(--r2)';g.style.boxShadow='0 24px 64px rgba(80,60,160,0.26)';
    const cc=g.querySelector('.ghost-card-content');
    if(cc){cc.style.transition=`opacity ${DUR*.3}ms ease`;cc.style.opacity='0';}
  });
  setTimeout(()=>{
    panel.style.cssText='opacity:1;pointer-events:all;transition:opacity .18s ease;';
    if(g.parentNode)g.remove();ghostEl=null;
  },DUR-40);
}

function _resetModal(instant){
  const ov=document.getElementById('modalOverlay');
  const panel=document.getElementById('modalPanel');
  const grid=document.getElementById('gridContainer');
  ov.classList.remove('open');
  panel.style.cssText='opacity:0;pointer-events:none;';
  if(isMob()){panel.style.transform='translateX(100%)';panel.style.transition='none';}
  grid.style.cssText='';
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  document.body.style.overflow='';
  modalOpen=false;closeTimer=null;
}

function closeModal(){
  if(!modalOpen)return;
  const panel=document.getElementById('modalPanel');
  panel.style.pointerEvents='none';
  if(isMob()){
    panel.style.transition='transform .36s cubic-bezier(0.4,0,0.2,1)';
    panel.style.transform='translateX(100%)';
    closeTimer=setTimeout(()=>_resetModal(false),380);
  } else {
    const grid=document.getElementById('gridContainer');
    const bd=document.getElementById('modalBackdrop');
    panel.style.cssText='pointer-events:none;transition:opacity .22s ease,transform .22s ease;opacity:0;transform:scale(0.96) translateY(8px);';
    bd.style.cssText='transition:opacity .22s ease;opacity:0;';
    grid.style.cssText='transition:opacity .28s ease,filter .28s ease;';
    setTimeout(()=>{grid.style.cssText='';},290);
    if(ghostEl){ghostEl.remove();ghostEl=null;}
    closeTimer=setTimeout(()=>_resetModal(false),250);
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&modalOpen)closeModal();});

/* ── ENTRANCE ANIMATIONS ── */
function _clearTimers(){animTimers.forEach(clearTimeout);animTimers=[];}

function triggerEntranceAnim(){
  _clearTimers();
  if(isMob()){
    _animateMobileRows();
  } else {
    if(currentView==='grid')_animateGrid();
    else _animateList();
  }
}

function _animateGrid(){
  const cols=Array.from(document.querySelectorAll('.grid-day-col'));
  if(!cols.length)return;
  /* Reset all cols first synchronously */
  cols.forEach(col=>{
    col.classList.remove('entered');
    col.querySelectorAll('.day-header,.activity-card,.empty-col').forEach(c=>c.style.transitionDelay='');
  });
  /* Force reflow */
  document.getElementById('gridContainer').offsetHeight;
  cols.forEach((col,i)=>{
    const t=setTimeout(()=>{
      col.classList.add('entered');
      col.querySelectorAll('.day-header,.activity-card,.empty-col').forEach((c,ci)=>{c.style.transitionDelay=`${ci*60}ms`;});
    },80+i*55);
    animTimers.push(t);
  });
}

function _animateList(){
  const nav=document.getElementById('dayNav');
  nav.classList.remove('list-nav-anim');
  void nav.offsetWidth;
  nav.classList.add('list-nav-anim');
  _animateListRows();
}

function _animateListRows(){
  const panel=document.querySelector('.list-panel.active');
  if(!panel)return;
  const rows=Array.from(panel.querySelectorAll('.list-row'));
  rows.forEach((row,i)=>{
    row.classList.remove('list-anim');
    void row.offsetWidth;
    row.style.animationDelay=`${i*55}ms`;
    row.classList.add('list-anim');
  });
}

function _animateMobileRows(){
  const t=setTimeout(()=>{
    const panel=document.getElementById(`mPanel${currentDayIdx}`);
    if(!panel)return;
    panel.querySelectorAll('.mobile-row,.mobile-empty').forEach((r,i)=>{
      r.classList.remove('mob-anim');
      void r.offsetWidth;
      r.style.animationDelay=`${i*50}ms`;
      r.classList.add('mob-anim');
    });
  },40);
  animTimers.push(t);
}

/* ── TOAST ── */
let _tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2600);}

/* ── UTILS ── */
function todayStr(){return new Date().toISOString().split('T')[0];}
function fDate(str){if(!str)return'';const d=new Date(str+'T12:00:00');return`${d.getDate()} ${NL_MON[d.getMonth()]}`;}
function fDateLong(str){if(!str)return'';const d=new Date(str+'T12:00:00');return`${NL_DAYS_F[d.getDay()]} ${d.getDate()} ${NL_MON_F[d.getMonth()]}`;}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

initApp();
</script>
